services:
  - type: web
    name: reunite-lost-found-portal
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false   # Set this manually in Render dashboard (MongoDB Atlas URI)
      - key: GOOGLE_CLIENT_ID
        value: 218957104612-n19a7thitavu827o9bo2mr1umavlfqur.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: SERVER_URL
        value: https://reunite-lost-found-portal.onrender.com
      - key: GOOGLE_CALLBACK_URL
        value: https://reunite-lost-found-portal.onrender.com/auth/google/callback
      - key: NODE_ENV
        value: production